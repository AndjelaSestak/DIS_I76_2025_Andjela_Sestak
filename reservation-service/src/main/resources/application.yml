spring:
  application:
    name: reservation-service
  config:
    import: "optional:configserver:http://localhost:8888"
  cloud:
    inetutils:
      ignored-interfaces:
        - "vEthernet.*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    ip-address: ${EUREKA_INSTANCE_IP_ADDRESS:127.0.0.1}
