spring:
  application:
    name: notification-service-test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false
  sql:
    init:
      mode: never
  cloud:
    config:
      enabled: false
  rabbitmq:
    host: localhost
    port: 5672

eureka:
  client:
    enabled: false

server:
  port: 0
