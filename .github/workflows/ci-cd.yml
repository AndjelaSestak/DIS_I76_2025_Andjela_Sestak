name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write
  packages: write
  actions: read

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: -Xmx1024m -Dhttps.protocols=TLSv1.2,TLSv1.3 -Djava.security.egd=file:/dev/./urandom

jobs:
  # ============================================
  # BUILD JOB - Compile all services
  # ============================================
  build:
    name: Build All Services
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      run: mvn clean compile -DskipTests

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

  # ============================================
  # TEST JOB - Run all tests
  # ============================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        service:
          - eureka-server
          - config-server
          - api-gateway
          - user-service
          - hotel-service
          - reservation-service
          - payment-service
          - notification-service

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'maven'

    - name: Run tests for ${{ matrix.service }}
      run: |
        cd ${{ matrix.service }}
        mvn test

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.service }}
        path: ${{ matrix.service }}/target/surefire-reports/

    - name: Generate test coverage report
      if: |
        matrix.service == 'user-service' ||
        matrix.service == 'hotel-service' ||
        matrix.service == 'reservation-service' ||
        matrix.service == 'payment-service' ||
        matrix.service == 'notification-service'
      run: |
        cd ${{ matrix.service }}
        mvn jacoco:report

    - name: Upload coverage report
      if: |
        matrix.service == 'user-service' ||
        matrix.service == 'hotel-service' ||
        matrix.service == 'reservation-service' ||
        matrix.service == 'payment-service' ||
        matrix.service == 'notification-service'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-${{ matrix.service }}
        path: ${{ matrix.service }}/target/site/jacoco/

  # ============================================
  # PACKAGE JOB - Create Docker images
  # ============================================
  package:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    strategy:
      matrix:
        service:
          - eureka-server
          - config-server
          - api-gateway
          - user-service
          - hotel-service
          - reservation-service
          - payment-service
          - notification-service

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'maven'

    - name: Build JAR
      run: |
        cd ${{ matrix.service }}
        mvn clean package -DskipTests

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        cd ${{ matrix.service }}
        docker build -t ${{ matrix.service }}:${{ github.sha }} .
        docker tag ${{ matrix.service }}:${{ github.sha }} ${{ matrix.service }}:latest

    - name: Save Docker image
      run: |
        docker save ${{ matrix.service }}:latest | gzip > ${{ matrix.service }}.tar.gz

    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image-${{ matrix.service }}
        path: ${{ matrix.service }}.tar.gz

  # ============================================
  # DEPLOY TO STAGING
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: package
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: http://staging.hotel-reservation.com

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all Docker images
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Deploy to Staging
      run: |
        echo "Deploying to Staging environment..."
        echo "Staging deployment completed!"

  # ============================================
  # DEPLOY TO PRODUCTION (Manual approval required)
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: http://hotel-reservation.com

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download all Docker images
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Deploy to Production
      run: |
        echo "Deploying to Production environment..."
        echo "Production deployment completed!"

    - name: Create Release Tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a v${{ github.run_number }} -m "Release v${{ github.run_number }}"
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git v${{ github.run_number }}
